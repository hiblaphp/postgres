name: PostgreSQL 15 Tests

on: [push, pull_request]

jobs:
  pg15-ci:
    name: PHP ${{ matrix.php }} - PostgreSQL 15
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.4', '8.5']

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none
          extensions: openssl, zlib, bcmath, mbstring

      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: ~/.composer/cache/files
          key: dependencies-php-${{ matrix.php }}-composer-${{ hashFiles('composer.json') }}
          restore-keys: |
            dependencies-php-${{ matrix.php }}-composer-
            dependencies-php-

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Start PostgreSQL 15 Services
        run: docker compose up -d postgres15 postgres15_ssl

      - name: Wait for PostgreSQL 15 Health
        run: |
          echo "Waiting for PostgreSQL 15 containers to be healthy..."
          ATTEMPTS=0
          until [ $ATTEMPTS -eq 30 ] || [ $(docker ps --filter "health=healthy" | grep -c "postgres15") -eq 2 ]; do
            sleep 2
            ATTEMPTS=$((ATTEMPTS+1))
          done
          docker ps

      - name: Run Static Analysis
        run: composer analyze

      - name: Run Tests
        run: composer test:pg15

      - name: Shutdown Services
        if: always()
        run: docker compose down -v